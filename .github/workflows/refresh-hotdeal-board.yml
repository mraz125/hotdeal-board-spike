name: Refresh hotdeal board

on:
  schedule:
    # Run at minute 0 every hour. GitHub may queue the job briefly, but the
    # workflow is requested exactly on the hour.
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'public/index.html'
      - 'public/styles.css'
      - 'public/app.js'
      - 'public/data/deals.json'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/refresh-hotdeal-board.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: hotdeal-board-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: github.event_name != 'push'
        run: python -m pip install -r requirements.txt

      - name: Collect and validate deals
        if: github.event_name != 'push'
        run: python scripts/hourly_collect.py

      - name: Commit refreshed public data
        if: github.event_name != 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/data/deals.json
          if git diff --cached --quiet; then
            echo 'No data changes to commit.'
          else
            git commit -m 'chore(data): refresh hotdeal board data'
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before Pages deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Retry Deploy to GitHub Pages
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Fail if Pages deployment failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: exit 1
